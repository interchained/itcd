name: nedb-ffi CI / Release

# Builds the NEDB Rust FFI crate on Linux, macOS, and Windows.
# On v* tags: publishes libnedb_ffi + nedb.h to GitHub Releases.
#
# Phase 1 (default): BTreeMap-backed in-process store.
# Phase 2: cargo build --features phase2  (nedb_core_v2::Db — uncomment dep in Cargo.toml)

on:
  push:
    branches: ['**']
    tags:     ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Build + test nedb-ffi on all three platforms ────────────────────────
  nedb-ffi:
    name: nedb-ffi · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name:     linux-x86_64
            os:       ubuntu-latest
            lib_path: nedb-ffi/target/release/libnedb_ffi.a
            artifact: libnedb_ffi-linux-x86_64.a

          - name:     macos-arm64
            os:       macos-latest
            lib_path: nedb-ffi/target/release/libnedb_ffi.a
            artifact: libnedb_ffi-macos-arm64.a

          - name:     macos-x86_64
            os:       macos-13   # Intel runner — for iMac / MacBook Pro Intel
            lib_path: nedb-ffi/target/release/libnedb_ffi.a
            artifact: libnedb_ffi-macos-x86_64.a

          - name:     windows-x86_64
            os:       windows-latest
            lib_path: nedb-ffi/target/release/nedb_ffi.lib
            artifact: nedb_ffi-windows-x86_64.lib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            nedb-ffi/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('nedb-ffi/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo build --release
        working-directory: nedb-ffi
        run: cargo build --release

      - name: cargo test --release
        working-directory: nedb-ffi
        run: cargo test --release

      - name: cargo clippy
        working-directory: nedb-ffi
        run: cargo clippy -- -D warnings

      - name: Verify nedb.h was generated by cbindgen
        shell: bash
        run: |
          test -f nedb-ffi/nedb.h || { echo "ERROR: nedb.h missing"; exit 1; }
          echo "nedb.h OK — $(wc -l < nedb-ffi/nedb.h | tr -d ' ') lines"

      # Rename to platform-specific artifact name for download
      - name: Stage artifact
        shell: bash
        run: cp "${{ matrix.lib_path }}" "${{ matrix.artifact }}"

      - name: Upload library artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            nedb-ffi/nedb.h
          if-no-files-found: error

  # ── Publish to GitHub Releases on v* tags ───────────────────────────────
  release:
    name: Publish GitHub Release
    needs: nedb-ffi
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all FFI artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## nedb-ffi ${{ github.ref_name }}

            Pre-built `nedb-ffi` static libraries and the C header for
            linking the NEDB DAG engine into the ITC C++ node.

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `libnedb_ffi-linux-x86_64.a` |
            | macOS arm64  | `libnedb_ffi-macos-arm64.a`  |
            | Windows x86_64 | `nedb_ffi-windows-x86_64.lib` |

            Include `nedb.h` and link the appropriate `.a` / `.lib` to use
            NEDB as the storage backend for itcd.

            See [NEDB.md](https://github.com/Eth-Interchained/itcd/blob/main/NEDB.md)
            for architecture details and the Phase 2 upgrade path.
          files: |
            dist/*.a
            dist/*.lib
            dist/nedb.h
